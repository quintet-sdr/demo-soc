upstream vulnbank {
    server 192.168.31.200:5000;
    keepalive 32;
}

upstream juiceshop {
    server 192.168.31.163:3000;                 
    keepalive 32;
}

upstream wazuh {
    server 192.168.31.152;
    keepalive 32;
}


server {
    listen 80;
    server_name vulnbank;

    location / {
        proxy_pass http://vulnbank;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name juiceshop;

    location / {
        proxy_pass http://juiceshop;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}


server {
    listen 80;
    server_name wazuh;

    location / {
        proxy_pass http://wazuh;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
